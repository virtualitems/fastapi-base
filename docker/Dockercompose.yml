version: '3.8'

services:
  fastapi:
    pull_policy: build
    build:
      context: ..
      dockerfile: docker/fastapi/Dockerfile.yml
      no_cache: true
    env_file:
      - ../.env
    command: python -m uvicorn server.main:server --host 0.0.0.0 --port 80 --reload
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget2", "-q", "-O", "-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    pull_policy: build
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile.yml
      no_cache: true
    ports:
      - "80:80"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
